<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Douschool - Sistema Unificado</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="notebook-tabs-container">
    <div class="notebook-tab">Top do Rank</div>
    <div class="notebook-tab">sequência de dias</div>
    <div class="notebook-tab">Pontos</div>
    <div class="notebook-tab active-tab">Perfil do aluno ajudado</div>
    <div class="notebook-tab-indicator">◀ um ajudando</div>
  </div>

  <main class="main-container">
    
    <div class="subject-card">
      <div class="card-question">?</div>
      <div class="difficulty-tag">
        Nível: <span id="diff-card-1"></span>
      </div>
    </div>
    
    <div class="subject-card">
      <div class="card-question">?</div>
      <div class="difficulty-tag">
        Nível: <span id="diff-card-2"></span>
      </div>
    </div>
    
    <div class="subject-card">
      <div class="card-question">?</div>
      <div class="difficulty-tag">
        Nível: <span id="diff-card-3"></span>
      </div>
    </div>

  </main>

  <footer class="bottom-nav">
    <button class="nav-item">
      <i class="icon">🛠️</i>
      <span>Funções</span>
    </button>
    <button class="nav-item">
      <i class="icon">📚</i>
      <span>Matérias</span>
    </button>
    <button class="nav-item">
      <i class="icon">🏆</i>
      <span>Missões</span>
    </button>
  </footer>

  <!-- JavaScript separado -->
  <script src="site.js"></script>
</body>
</html>
